#Config Application
spring:
  application:
    name: movie-booking-system

  #Database config
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/movie-book?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASS:123456789}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}

  #Jpa config
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  #Flyway config
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  #Redis config
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 60000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 10
          min-idle: 0

  #Mail config
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MailAdmin}
    password: ${password-email}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

#Server config
server:
  port: 8080


#Security config
jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
  refresh-expiration: 86400000


#Logging config
logging:
  level:
    root: INFO
    com.hoangdung.movie_booking: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"